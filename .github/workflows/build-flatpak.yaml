name: "Automated Flatpak Build"

on:
  schedule:
    - cron: '0 0 1 * *'
  
  workflow_dispatch:

jobs:
  build-flatpak:
    name: "Build Flatpak"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Flatpak Environment"
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder xvfb
          
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Sdk//25.08 org.freedesktop.Platform//25.08 org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: "Build Flatpak Artifact"
        uses: flatpak/flatpak-github-actions/flatpak-builder@master
        with:
          bundle: ${{ github.event.repository.name }}.flatpak
          manifest-path: ${{ github.event.repository.name }}.yaml
          cache: true
          cache-key: ${{ github.event.repository.name }}-flatpak-cache
          run-tests: false

      - name: "Upload Flatpak Bundle"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}.flatpak
          path: ${{ github.event.repository.name }}.flatpak